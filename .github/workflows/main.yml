name: Actualizar Dashboard de Inventario

on:
  push:
    branches:
      - main
  schedule:
    # Se ejecuta todos los días a las 08:00 UTC (04:00 AM hora de Chile)
    - cron: '0 8 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl office365-rest-python-client Pillow

      - name: Ejecutar Extractor de SharePoint
        run: python inv.py

      - name: Commit y Push del nuevo index.html
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          # Si no hay cambios, no hace commit para no generar error
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática del Dashboard"
          git push
